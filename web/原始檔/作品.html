<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
<meta charset="UTF-8">

<title>工藤晴香-作品</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background-color:#f4f6fb;
}

/* 頁面標題 */
.page-title{
  text-align:center;
  margin-top:40px;
  margin-bottom:40px;
  font-weight:bold;
}

/* 副標題 */
.section-title{
  margin-top:50px;
  margin-bottom:30px;
  font-weight:bold;
  text-align:center;
}

/* 一般作品圖片 */
.card-img-top{
  height:200px;
  object-fit:cover;
}

/* 寫真集圖片（直式） */
.photobook{
  height:220px;
  object-fit:contain;
  display:block;
  margin:auto;
}

/* 卡片文字置中 */
.card-body.text-center{
  text-align:center;
}

/* YouTube 影片縮圖 */
.youtube-card img{
  width:100%;
  max-width:320px;
  height:auto;
  border-radius:8px;
  display:block;
  margin:auto;
}
.youtube-card p{
  text-align:center;
  margin-top:8px;
  font-weight:bold;
}
</style>
</head>
